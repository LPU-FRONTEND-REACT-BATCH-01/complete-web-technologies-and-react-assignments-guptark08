<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
</head>
<body>
    <h1>Grocery List</h1>
    <table border="1">
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Category</th>
        </tr>
        <tr>
            <td>Milk</td>
            <td>2 liters</td>
            <td>Dairy</td>
        </tr>
        <tr>
            <td>Bread</td>
            <td>1 loaf</td>
            <td>Bakery</td>
        </tr>
        <tr>
            <td>Eggs</td>
            <td>12 pieces</td>
            <td>Dairy</td>
        </tr>
        <tr>
            <td>Apples</td>
            <td>2 kg</td>
            <td>Fruits</td>
        </tr>
        <tr>
            <td>Tomatoes</td>
            <td>1 kg</td>
            <td>Vegetables</td>
        </tr>
        <tr>
            <td>Rice</td>
            <td>5 kg</td>
            <td>Grains</td>
        </tr>
        <tr>
            <td>Chicken</td>
            <td>1.5 kg</td>
            <td>Meat</td>
        </tr>
        <tr>
            <td>Cheese</td>
            <td>500 g</td>
            <td>Dairy</td>
        </tr>
    </table>
</body>
</html>

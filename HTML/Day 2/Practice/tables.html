<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="2" align="center">
        <thead >
            <tr>
                <th>Name</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody align="center">
            <tr>
                <td>John</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Jane</td>
                <td>92</td>
            </tr>
            <tr>
                <td>Doe</td>
                <td>78</td>
            </tr>
    </table>
</body>
</html>
